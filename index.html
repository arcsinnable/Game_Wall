<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #1a1a1c; --surface2: #242426;
    --border: rgba(255,255,255,0.08); --text: #f0ede8;
    --text-muted: #888683; --text-dim: #555350;
    --accent: #c8a96e; --accent-dim: rgba(200,169,110,0.15);
    --tier-a: #e8c86e; --tier-a-dim: rgba(232,200,110,0.15);
    --tier-b: #6eaee8; --tier-b-dim: rgba(110,174,232,0.15);
    --tier-c: #6ed48a; --tier-c-dim: rgba(110,212,138,0.15);
    --tier-d: #555350; --tier-d-dim: rgba(85,83,80,0.2);
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; padding: 0 0 100px; }

  header { padding: 60px 40px 40px; max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .header-left h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,5vw,3rem); font-weight: 600; letter-spacing: -0.02em; }
  .header-left p { margin-top: 8px; color: var(--text-muted); font-size: 14px; letter-spacing: 0.04em; }
  .header-right { display: flex; align-items: flex-end; gap: 32px; }
  .stats { display: flex; gap: 32px; }
  .stat { text-align: right; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  .admin-btn {
    background: transparent; border: 0.5px solid var(--border); color: var(--text-dim);
    padding: 6px 14px; border-radius: 20px; font-size: 11px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.18s; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .admin-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-muted); }
  .admin-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .divider { max-width: 1200px; margin: 0 auto 28px; padding: 0 40px; border-top: 0.5px solid var(--border); }

  .filter-row { max-width: 1200px; margin: 0 auto 10px; padding: 0 40px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; min-width: 32px; }
  .filter-btn { background: transparent; border: 0.5px solid var(--border); color: var(--text-muted); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em; }
  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .filter-btn.fa.active { background: var(--tier-a-dim); border-color: var(--tier-a); color: var(--tier-a); }
  .filter-btn.fb.active { background: var(--tier-b-dim); border-color: var(--tier-b); color: var(--tier-b); }
  .filter-btn.fc.active { background: var(--tier-c-dim); border-color: var(--tier-c); color: var(--tier-c); }
  .filter-btn.fd.active { background: var(--tier-d-dim); border-color: var(--tier-d); color: var(--text-muted); }

  .date-row { max-width: 1200px; margin: 0 auto 28px; padding: 0 40px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .date-sel { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text-muted); padding: 5px 28px 5px 12px; border-radius: 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23555350' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; }
  .date-sel:focus { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .date-sel option { background: #1a1a1c; }

  .grid { max-width: 1200px; margin: 0 auto; padding: 0 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.25s cubic-bezier(0.23,1,0.32,1), border-color 0.2s; position: relative; cursor: pointer; }
  .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.16); }
  .card-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--surface2); }
  .card-cover-fallback { width: 100%; aspect-ratio: 3/4; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 40px; }

  .card-tier { position: absolute; top: 10px; left: 10px; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; font-family: 'Playfair Display', serif; }
  .tb-a { background: rgba(232,200,110,0.25); color: var(--tier-a); border: 0.5px solid rgba(232,200,110,0.4); }
  .tb-b { background: rgba(110,174,232,0.2); color: var(--tier-b); border: 0.5px solid rgba(110,174,232,0.35); }
  .tb-c { background: rgba(110,212,138,0.15); color: var(--tier-c); border: 0.5px solid rgba(110,212,138,0.3); }
  .tb-d { background: rgba(85,83,80,0.25); color: var(--text-dim); border: 0.5px solid rgba(85,83,80,0.3); }

  .card-status { position: absolute; top: 10px; right: 10px; font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
  .st-finished { background: rgba(88,212,138,0.15); color: #58d48a; border: 0.5px solid rgba(88,212,138,0.25); }
  .st-playing  { background: rgba(200,169,110,0.15); color: var(--accent); border: 0.5px solid rgba(200,169,110,0.25); }
  .st-dropped  { background: rgba(232,96,76,0.12); color: #e8604c; border: 0.5px solid rgba(232,96,76,0.2); }
  .st-backlog  { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 0.5px solid var(--border); }

  .card-edit { position: absolute; bottom: 52px; right: 9px; width: 27px; height: 27px; background: rgba(14,14,15,0.88); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 6px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.18s; cursor: pointer; z-index: 5; }
  .card:hover .card-edit { opacity: 1; }
  .card-edit:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  .card-body { padding: 11px 13px 13px; }
  .card-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .card-meta { margin-top: 3px; font-size: 11px; color: var(--text-dim); }
  .card-date { margin-top: 2px; font-size: 10px; color: var(--text-dim); }

  /* Modals shared */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 100; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
  .modal-bg.open { display: flex; }

  /* View modal */
  .modal { background: var(--surface); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 16px; max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-hero { width: 100%; height: 200px; object-fit: cover; border-radius: 16px 16px 0 0; display: block; background: var(--surface2); }
  .modal-content { padding: 22px 26px 26px; }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 16px; }
  .modal-title-wrap { display: flex; align-items: center; gap: 10px; }
  .modal-tier-badge { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; font-family: 'Playfair Display', serif; flex-shrink: 0; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; line-height: 1.2; }
  .modal-close { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text-muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 4px; background: var(--surface2); color: var(--text-muted); border: 0.5px solid var(--border); }
  .tier-desc-box { background: var(--surface2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: var(--text-muted); line-height: 1.65; border-left: 2px solid transparent; }
  .tdb-a { border-left-color: var(--tier-a); } .tdb-b { border-left-color: var(--tier-b); }
  .tdb-c { border-left-color: var(--tier-c); } .tdb-d { border-left-color: var(--tier-d); }
  .modal-review { font-size: 14px; line-height: 1.8; color: var(--text-muted); border-left: 2px solid var(--accent); padding-left: 14px; }
  .modal-date { margin-top: 16px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .modal-edit-btn { margin-top: 18px; background: var(--surface2); border: 0.5px solid var(--border); color: var(--text-muted); padding: 7px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .modal-edit-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* Form modal */
  .form-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 200; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
  .form-modal-bg.open { display: flex; }
  .form-modal { background: var(--surface); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 16px; max-width: 460px; width: 100%; padding: 26px; max-height: 92vh; overflow-y: auto; }
  .form-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 15px; }
  .form-label { display: block; font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; transition: border-color 0.18s; outline: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: rgba(200,169,110,0.45); }
  .form-select option { background: #1a1a1c; }
  .form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

  .tier-picker { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .tier-opt { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 6px; cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
  .tier-opt:hover { border-color: rgba(255,255,255,0.18); }
  .tier-opt-letter { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
  .tier-opt-desc { font-size: 9px; color: var(--text-dim); line-height: 1.4; }
  .ta .tier-opt-letter { color: var(--tier-a); } .ta.sel { background: var(--tier-a-dim); border-color: var(--tier-a); }
  .tb .tier-opt-letter { color: var(--tier-b); } .tb.sel { background: var(--tier-b-dim); border-color: var(--tier-b); }
  .tc .tier-opt-letter { color: var(--tier-c); } .tc.sel { background: var(--tier-c-dim); border-color: var(--tier-c); }
  .td .tier-opt-letter { color: var(--tier-d); } .td.sel { background: var(--tier-d-dim); border-color: var(--tier-d); }

  .form-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-cancel { flex: 1; background: transparent; border: 0.5px solid var(--border); color: var(--text-muted); padding: 9px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .btn-delete { flex: 1; background: rgba(232,96,76,0.1); border: 0.5px solid rgba(232,96,76,0.25); color: #e8604c; padding: 9px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; display: none; }
  .btn-delete:hover { background: rgba(232,96,76,0.18); }
  .btn-save { flex: 2; background: var(--accent); border: none; color: #0e0e0f; padding: 9px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.88; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Password modal */
  .pw-modal { background: var(--surface); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 16px; max-width: 340px; width: 100%; padding: 28px; }
  .pw-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 6px; }
  .pw-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .pw-error { font-size: 12px; color: #e8604c; margin-top: 8px; min-height: 16px; }
  .pw-actions { display: flex; gap: 8px; margin-top: 16px; }

  .add-btn { position: fixed; bottom: 36px; right: 40px; background: var(--accent); color: #0e0e0f; border: none; border-radius: 28px; padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: none; align-items: center; gap: 7px; box-shadow: 0 4px 24px rgba(200,169,110,0.22); transition: all 0.2s; z-index: 50; }
  .add-btn.visible { display: flex; }
  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,169,110,0.32); }

  .loading { text-align: center; padding: 80px 40px; color: var(--text-dim); grid-column: 1/-1; font-size: 13px; letter-spacing: 0.06em; }
  .empty-state { text-align: center; padding: 80px 40px; color: var(--text-dim); grid-column: 1/-1; font-size: 14px; }

  @media (max-width: 600px) {
    header, .divider, .filter-row, .date-row, .grid { padding-left: 18px; padding-right: 18px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 12px; }
    .add-btn { bottom: 20px; right: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Game Wall</h1>
    <p>sinnable · 游戏记录</p>
  </div>
  <div class="header-right">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">games</div></div>
      <div class="stat"><div class="stat-num" id="stat-finished">—</div><div class="stat-label">finished</div></div>
      <div class="stat"><div class="stat-num" id="stat-a">—</div><div class="stat-label">tier A</div></div>
    </div>
    <button class="admin-btn" id="admin-btn">编辑模式</button>
  </div>
</header>

<div class="divider"></div>

<div class="filter-row">
  <span class="filter-label">状态</span>
  <button class="filter-btn active" data-status="all">全部</button>
  <button class="filter-btn" data-status="finished">Finished</button>
  <button class="filter-btn" data-status="playing">Playing</button>
  <button class="filter-btn" data-status="dropped">Dropped</button>
  <button class="filter-btn" data-status="backlog">Backlog</button>
</div>
<div class="filter-row">
  <span class="filter-label">档位</span>
  <button class="filter-btn active" data-tier="all">全部</button>
  <button class="filter-btn fa" data-tier="A">A</button>
  <button class="filter-btn fb" data-tier="B">B</button>
  <button class="filter-btn fc" data-tier="C">C</button>
  <button class="filter-btn fd" data-tier="D">D</button>
  <button class="filter-btn" data-tier="none">未评</button>
</div>
<div class="date-row">
  <span class="filter-label">日期</span>
  <select class="date-sel" id="year-sel"><option value="all">所有年份</option></select>
  <select class="date-sel" id="month-sel" style="display:none">
    <option value="all">所有月份</option>
    <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
    <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
    <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
    <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
  </select>
</div>

<div class="grid" id="grid"><div class="loading">Loading...</div></div>

<!-- View modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <img class="modal-hero" id="modal-cover" src="" alt="">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <div class="modal-tier-badge" id="modal-tier-badge"></div>
          <div class="modal-title" id="modal-title"></div>
        </div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="tier-desc-box" id="modal-tier-desc" style="display:none"></div>
      <div class="modal-review" id="modal-review" style="display:none"></div>
      <div class="modal-date" id="modal-date"></div>
      <button class="modal-edit-btn" id="modal-edit-btn" style="display:none">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        编辑
      </button>
    </div>
  </div>
</div>

<!-- Form modal -->
<div class="form-modal-bg" id="form-modal-bg">
  <div class="form-modal">
    <div class="form-title" id="form-title-label">添加游戏</div>
    <div class="form-group"><label class="form-label">游戏名称</label><input class="form-input" id="f-title" placeholder="e.g. 艾尔登法环"></div>
    <div class="form-group"><label class="form-label">封面图片 URL</label><input class="form-input" id="f-cover" placeholder="Steam 图片链接或其他 URL"></div>
    <div class="form-group"><label class="form-label">平台 / 发行年份</label><input class="form-input" id="f-meta" placeholder="e.g. PC · 2022"></div>
    <div class="form-group">
      <label class="form-label">状态</label>
      <select class="form-select" id="f-status">
        <option value="finished">Finished</option>
        <option value="playing">Playing</option>
        <option value="dropped">Dropped</option>
        <option value="backlog">Backlog（待玩）</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">通关日期</label><input class="form-input" id="f-date" type="date"></div>
    <div class="form-group">
      <label class="form-label">档位评定</label>
      <div class="tier-picker">
        <div class="tier-opt ta" data-t="A"><div class="tier-opt-letter">A</div><div class="tier-opt-desc">此生难忘</div></div>
        <div class="tier-opt tb" data-t="B"><div class="tier-opt-letter">B</div><div class="tier-opt-desc">人人必玩</div></div>
        <div class="tier-opt tc" data-t="C"><div class="tier-opt-letter">C</div><div class="tier-opt-desc">特定人群</div></div>
        <div class="tier-opt td" data-t="D"><div class="tier-opt-letter">D</div><div class="tier-opt-desc">不推荐</div></div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">感想 / 短评</label><textarea class="form-textarea" id="f-review" placeholder="写点什么…"></textarea></div>
    <div class="form-actions">
      <button class="btn-cancel" id="form-cancel">取消</button>
      <button class="btn-delete" id="btn-delete">删除</button>
      <button class="btn-save" id="form-save">保存</button>
    </div>
  </div>
</div>

<!-- Password modal -->
<div class="modal-bg" id="pw-modal-bg">
  <div class="pw-modal">
    <div class="pw-title">编辑模式</div>
    <div class="pw-sub">输入密码以启用添加和编辑功能</div>
    <div class="form-group">
      <input class="form-input" id="pw-input" type="password" placeholder="密码" autocomplete="current-password">
    </div>
    <div class="pw-error" id="pw-error"></div>
    <div class="pw-actions">
      <button class="btn-cancel" id="pw-cancel">取消</button>
      <button class="btn-save" id="pw-confirm">确认</button>
    </div>
  </div>
</div>

<button class="add-btn" id="add-btn">
  <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  添加游戏
</button>

<script>
// ─── 配置 ───────────────────────────────────────────────
const SUPABASE_URL = 'https://kccnfabiihalrfygkthj.supabase.co';
const SUPABASE_ANON = 'sb_publishable_A6xM5UNvgRP8uus3qaACFQ_OzRKx3ZB';
const ADMIN_PASSWORD = 'f666666';
// ────────────────────────────────────────────────────────

const TIER_INFO = {
  A: { desc: '此生难忘的游戏——它改变了我对游戏这个媒介的理解，或者留下了无法磨灭的情感印记。' },
  B: { desc: '我认为每个人都应该玩一遍的游戏，不分喜好，游戏性与品质足以打动大多数玩家。' },
  C: { desc: '适合特定人群的游戏——如果你喜欢这个类型或风格，它会是很好的体验；否则可能不是首选。' },
  D: { desc: '我不推荐给任何人玩的游戏。' }
};
const SL = { finished:'Finished', playing:'Playing', dropped:'Dropped', backlog:'Backlog' };

let games = [], fStatus='all', fTier='all', fYear='all', fMonth='all';
let selTier=null, editId=null, viewGame=null, isAdmin=false;

// ─── Supabase API ────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': 'Bearer ' + SUPABASE_ANON,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || ''
    },
    ...opts
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadGames() {
  try {
    const data = await sbFetch('games?select=*&order=created_at.desc');
    games = data || [];
  } catch(e) {
    console.error('加载失败', e);
    games = [];
  }
  render();
}

async function insertGame(g) {
  return sbFetch('games?select=*', {
    method: 'POST',
    prefer: 'return=representation',
    body: JSON.stringify(g)
  });
}

async function updateGame(id, g) {
  return sbFetch(`games?id=eq.${id}`, {
    method: 'PATCH',
    prefer: 'return=representation',
    body: JSON.stringify(g)
  });
}

async function deleteGame(id) {
  return sbFetch(`games?id=eq.${id}`, { method: 'DELETE' });
}

// ─── Render ──────────────────────────────────────────────
function years() {
  const y = new Set();
  games.forEach(g => { if(g.date) y.add(g.date.split('-')[0]); });
  return [...y].sort((a,b) => b-a);
}

function refreshYears() {
  const sel = document.getElementById('year-sel'), cur = sel.value;
  sel.innerHTML = '<option value="all">所有年份</option>';
  years().forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    if(y === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function filtered() {
  return games.filter(g => {
    if(fStatus !== 'all' && g.status !== fStatus) return false;
    if(fTier === 'none' && g.tier) return false;
    if(fTier !== 'all' && fTier !== 'none' && g.tier !== fTier) return false;
    if(fYear !== 'all') {
      if(!g.date) return false;
      const [y,m] = g.date.split('-');
      if(y !== fYear) return false;
      if(fMonth !== 'all' && parseInt(m) !== parseInt(fMonth)) return false;
    }
    return true;
  });
}

function render() {
  const grid = document.getElementById('grid');
  const list = filtered();
  document.getElementById('stat-total').textContent = games.length;
  document.getElementById('stat-finished').textContent = games.filter(g => g.status==='finished').length;
  document.getElementById('stat-a').textContent = games.filter(g => g.tier==='A').length;
  refreshYears();

  if(!list.length) {
    grid.innerHTML = '<div class="empty-state">🎮<br><br>没有符合条件的游戏</div>';
    return;
  }

  grid.innerHTML = list.map(g => `
    <div class="card" data-id="${g.id}">
      ${g.cover ? `<img class="card-cover" src="${g.cover}" alt="${g.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <div class="card-cover-fallback" style="${g.cover?'display:none':''}">🎮</div>
      ${g.tier ? `<div class="card-tier tb-${g.tier.toLowerCase()}">${g.tier}</div>` : ''}
      <div class="card-status st-${g.status}">${SL[g.status]}</div>
      ${isAdmin ? `<button class="card-edit" data-eid="${g.id}"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></button>` : ''}
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        <div class="card-meta">${g.meta||''}</div>
        ${g.date ? `<div class="card-date">${g.date}</div>` : ''}
      </div>
    </div>`).join('');

  grid.querySelectorAll('.card').forEach(c => c.addEventListener('click', e => {
    if(e.target.closest('.card-edit')) return;
    const g = games.find(x => x.id == c.dataset.id);
    if(g) openView(g);
  }));

  if(isAdmin) {
    grid.querySelectorAll('.card-edit').forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      const g = games.find(x => x.id == b.dataset.eid);
      if(g) openForm(g);
    }));
  }
}

// ─── View modal ──────────────────────────────────────────
function openView(g) {
  viewGame = g;
  const cv = document.getElementById('modal-cover');
  cv.src = g.cover||''; cv.style.display = g.cover ? 'block' : 'none';
  document.getElementById('modal-title').textContent = g.title;

  const tb = document.getElementById('modal-tier-badge');
  if(g.tier) { tb.className=`modal-tier-badge tb-${g.tier.toLowerCase()}`; tb.textContent=g.tier; tb.style.display='flex'; }
  else tb.style.display='none';

  document.getElementById('modal-tags').innerHTML = [
    g.meta ? `<span class="tag">${g.meta}</span>` : '',
    `<span class="tag st-${g.status}">${SL[g.status]}</span>`
  ].join('');

  const db = document.getElementById('modal-tier-desc');
  if(g.tier) { db.className=`tier-desc-box tdb-${g.tier.toLowerCase()}`; db.textContent=TIER_INFO[g.tier].desc; db.style.display='block'; }
  else db.style.display='none';

  const rv = document.getElementById('modal-review');
  rv.textContent = g.review||''; rv.style.display = g.review ? 'block' : 'none';
  document.getElementById('modal-date').textContent = g.date ? `通关于 ${g.date}` : '';
  document.getElementById('modal-edit-btn').style.display = isAdmin ? 'inline-flex' : 'none';
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeView() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = ''; viewGame = null;
}

// ─── Form modal ──────────────────────────────────────────
function openForm(g) {
  editId = g ? g.id : null; selTier = g ? g.tier : null;
  document.getElementById('form-title-label').textContent = g ? '编辑游戏' : '添加游戏';
  document.getElementById('f-title').value = g ? g.title : '';
  document.getElementById('f-cover').value = g ? (g.cover||'') : '';
  document.getElementById('f-meta').value = g ? (g.meta||'') : '';
  document.getElementById('f-status').value = g ? g.status : 'finished';
  document.getElementById('f-date').value = g ? (g.date||'') : new Date().toISOString().split('T')[0];
  document.getElementById('f-review').value = g ? (g.review||'') : '';
  document.querySelectorAll('.tier-opt').forEach(b => { b.classList.remove('sel'); if(g && b.dataset.t===g.tier) b.classList.add('sel'); });
  document.getElementById('btn-delete').style.display = g ? 'block' : 'none';
  document.getElementById('form-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeForm() {
  document.getElementById('form-modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

async function saveForm() {
  const title = document.getElementById('f-title').value.trim();
  if(!title) { alert('请填写游戏名称'); return; }

  const saveBtn = document.getElementById('form-save');
  saveBtn.disabled = true; saveBtn.textContent = '保存中…';

  const payload = {
    title,
    cover: document.getElementById('f-cover').value.trim() || null,
    meta: document.getElementById('f-meta').value.trim() || null,
    status: document.getElementById('f-status').value,
    tier: selTier || null,
    review: document.getElementById('f-review').value.trim() || null,
    date: document.getElementById('f-date').value || null
  };

  try {
    if(editId) {
      const res = await updateGame(editId, payload);
      const idx = games.findIndex(x => x.id===editId);
      if(idx > -1) games[idx] = res ? res[0] : { ...payload, id: editId };
    } else {
      const res = await insertGame(payload);
      if(res && res[0]) games.unshift(res[0]);
    }
    render(); closeForm();
  } catch(e) {
    alert('保存失败：' + e.message);
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = '保存';
  }
}

async function delGame() {
  if(!editId || !confirm('确定删除这个游戏？')) return;
  try {
    await deleteGame(editId);
    games = games.filter(x => x.id !== editId);
    render(); closeForm();
  } catch(e) {
    alert('删除失败：' + e.message);
  }
}

// ─── Admin / Password ────────────────────────────────────
function setAdmin(val) {
  isAdmin = val;
  const btn = document.getElementById('admin-btn');
  const fab = document.getElementById('add-btn');
  btn.textContent = val ? '退出编辑' : '编辑模式';
  btn.classList.toggle('active', val);
  fab.classList.toggle('visible', val);
  render();
}

document.getElementById('admin-btn').addEventListener('click', () => {
  if(isAdmin) { setAdmin(false); return; }
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
});

function closePw() {
  document.getElementById('pw-modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('pw-confirm').addEventListener('click', () => {
  const val = document.getElementById('pw-input').value;
  if(val === ADMIN_PASSWORD) { closePw(); setAdmin(true); }
  else { document.getElementById('pw-error').textContent = '密码错误'; }
});

document.getElementById('pw-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('pw-confirm').click();
});

document.getElementById('pw-cancel').addEventListener('click', closePw);
document.getElementById('pw-modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closePw(); });

// ─── Other events ────────────────────────────────────────
document.getElementById('modal-close').addEventListener('click', closeView);
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeView(); });
document.getElementById('modal-edit-btn').addEventListener('click', () => { const g=viewGame; closeView(); openForm(g); });
document.getElementById('add-btn').addEventListener('click', () => openForm(null));
document.getElementById('form-cancel').addEventListener('click', closeForm);
document.getElementById('form-modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeForm(); });
document.getElementById('form-save').addEventListener('click', saveForm);
document.getElementById('btn-delete').addEventListener('click', delGame);

document.querySelectorAll('.tier-opt').forEach(b => b.addEventListener('click', () => {
  const t = b.dataset.t;
  if(selTier===t) { selTier=null; b.classList.remove('sel'); }
  else { selTier=t; document.querySelectorAll('.tier-opt').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); }
}));

document.querySelectorAll('[data-status]').forEach(b => b.addEventListener('click', () => {
  fStatus=b.dataset.status;
  document.querySelectorAll('[data-status]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render();
}));

document.querySelectorAll('[data-tier]').forEach(b => b.addEventListener('click', () => {
  fTier=b.dataset.tier;
  document.querySelectorAll('[data-tier]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render();
}));

document.getElementById('year-sel').addEventListener('change', function() {
  fYear=this.value; fMonth='all'; document.getElementById('month-sel').value='all';
  document.getElementById('month-sel').style.display = fYear==='all' ? 'none' : 'inline-block'; render();
});
document.getElementById('month-sel').addEventListener('change', function() { fMonth=this.value; render(); });

// ─── Init ────────────────────────────────────────────────
loadGames();
</script>
</body>
</html>
